global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
- /etc/prometheus/alerts.yml
scrape_configs:
- job_name: "qdrant"
  metrics_path: /metrics
  static_configs:
  - targets: ["qdrant:6333"]
- job_name: "neo4j_probe"
  metrics_path: /probe
  params:
    module: [http_2xx]
  static_configs:
  - targets: ["http://neo4j:7474"]
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115
- job_name: "kafka_probe"
  metrics_path: /probe
  params:
    module: [tcp_connect]
  static_configs:
  - targets: ["kafka:29092"]
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115
- job_name: "flink_probe"
  metrics_path: /probe
  params:
    module: [http_2xx]
  static_configs:
  - targets: ["http://flink-jobmanager:8081"]
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115