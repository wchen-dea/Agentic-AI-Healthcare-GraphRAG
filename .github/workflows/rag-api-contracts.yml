name: rag-api-contracts

on:
  push:
    branches:
      - dev
    paths:
      - .github/workflows/rag-api-contracts.yml
      - rag-api/**
  pull_request:
    branches:
      - dev
    paths:
      - .github/workflows/rag-api-contracts.yml
      - rag-api/**

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: rag-api/requirements.txt

      - name: Create isolated venv
        run: python -m venv .venv311

      - name: Install rag-api dependencies
        run: .venv311/bin/python -m pip install -r rag-api/requirements.txt

      - name: Run rag-api contract tests
        run: .venv311/bin/python rag-api/tests/test_contracts.py

  container-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build rag-api container
        run: docker build -f rag-api/Dockerfile -t rag-api-contracts:ci .