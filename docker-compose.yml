services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: healthcare-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: healthcare-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    container_name: healthcare-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  conduktor-postgres:
    image: postgres:14
    container_name: healthcare-conduktor-postgres
    environment:
      POSTGRES_DB: conduktor
      POSTGRES_USER: conduktor
      POSTGRES_PASSWORD: change_me
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - conduktor_pg_data:/var/lib/postgresql/data

  conduktor-console:
    image: conduktor/conduktor-console:latest
    container_name: healthcare-conduktor-console
    depends_on:
      - kafka
      - schema-registry
      - conduktor-postgres
    ports:
      - "8085:8080"
    volumes:
      - conduktor_data:/var/conduktor
    environment:
      CDK_DATABASE_URL: postgresql://conduktor:change_me@conduktor-postgres:5432/conduktor
      CDK_ORGANIZATION_NAME: healthcare-demo
      CDK_ADMIN_EMAIL: admin@healthcare.local
      CDK_ADMIN_PASSWORD: Admin@123!
      CDK_CLUSTERS_0_ID: healthcare-kafka
      CDK_CLUSTERS_0_NAME: healthcare-kafka
      CDK_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      CDK_CLUSTERS_0_SCHEMAREGISTRY_URL: http://schema-registry:8081

  kafka-init:
    image: confluentinc/cp-kafka:7.9.0
    container_name: healthcare-kafka-init
    depends_on:
      - kafka
      - schema-registry
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      sleep 15
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.ehr.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.lab.results --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.device.telemetry --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.pharmacy.orders --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.claims.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.master.patients --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.master.providers --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.master.devices --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.master.medications --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.master.payers --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcare.dlq.events --partitions 1 --replication-factor 1
      echo 'Kafka topics created.'
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: healthcare-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5.26.2
    container_name: healthcare-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/healthcare123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - ./neo4j/init.cypher:/var/lib/neo4j/import/init.cypher

  neo4j-init:
    image: neo4j:5.26.2
    container_name: healthcare-neo4j-init
    depends_on:
      - neo4j
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      sleep 25
      cypher-shell -a bolt://neo4j:7687 -u neo4j -p healthcare123 -f /init.cypher || true
      "
    volumes:
      - ./neo4j/init.cypher:/init.cypher

  neodash:
    image: neo4jlabs/neodash:latest
    container_name: healthcare-neodash
    platform: linux/amd64
    depends_on:
      - neo4j
    ports:
      - "5005:5005"
    environment:
      standalone: "true"
      standaloneProtocol: neo4j
      standaloneHost: localhost
      standalonePort: "7687"
      standaloneDatabase: neo4j
      standaloneUsername: neo4j
      standalonePassword: healthcare123
      standalonePasswordWarningHidden: "true"
      customHeader: Healthcare Neo4j GUI

  ollama:
    image: ollama/ollama:latest
    container_name: healthcare-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink-app/Dockerfile
    container_name: healthcare-flink-jobmanager
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
        state.backend: hashmap
        execution.checkpointing.interval: 10000
        execution.checkpointing.mode: EXACTLY_ONCE
        python.executable: /usr/bin/python3

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink-app/Dockerfile
    container_name: healthcare-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        python.executable: /usr/bin/python3

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: healthcare-event-producer
    depends_on:
      - kafka-init
      - schema-registry
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      EVENT_INTERVAL_SECONDS: 1

  flink-app:
    build:
      context: .
      dockerfile: flink-app/Dockerfile
    container_name: healthcare-flink-app
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
      - kafka
      - qdrant
      - neo4j
      - neo4j-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: healthcare_events
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: healthcare123
      FLINK_KAFKA_GROUP_ID: healthcare-graphrag-pyflink
      FLINK_JOB_PARALLELISM: 1
      FLINK_CHECKPOINT_INTERVAL_MS: 10000
    command: >
      bash -c "sleep 35 && flink run -m flink-jobmanager:8081 -d -Dpython.client.executable=/usr/bin/python3 -Dpython.executable=/usr/bin/python3 -py /app/healthcare_graph_rag_pyflink_job.py && tail -f /dev/null"

  rag-api:
    build:
      context: .
      dockerfile: rag-api/Dockerfile
    container_name: healthcare-rag-api
    depends_on:
      - qdrant
      - neo4j
      - ollama
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: healthcare_events
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: healthcare123
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
      MCP_SERVER_NAME: HealthcareGraphRAG MCP

  provider-web:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: healthcare-provider-web
    depends_on:
      - rag-api
    ports:
      - "8088:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: healthcare-prometheus
    depends_on:
      - neo4j
      - qdrant
      - blackbox-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: healthcare-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: healthcare-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  qdrant_storage:
  neo4j_data:
  ollama_models:
  conduktor_pg_data:
  conduktor_data:
  prometheus_data:
  grafana_data:
