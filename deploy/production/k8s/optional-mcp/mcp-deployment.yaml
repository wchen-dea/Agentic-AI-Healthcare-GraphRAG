apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: healthcare-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
      - name: mcp-server
        image: ghcr.io/wchen-dea/agentic-ai-healthcare-graphrag-mcp-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8010
          name: http
        envFrom:
        - configMapRef:
            name: mcp-server-config
        - secretRef:
            name: mcp-server-secrets
        readinessProbe:
          httpGet:
            path: /mcp
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /mcp
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"