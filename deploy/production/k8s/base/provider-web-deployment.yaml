apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-web
  namespace: healthcare-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: provider-web
  template:
    metadata:
      labels:
        app: provider-web
    spec:
      containers:
      - name: provider-web
        image: ghcr.io/wchen-dea/agentic-ai-healthcare-graphrag-provider-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"