apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-ai-ingress
  namespace: healthcare-ai
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: ai.company.example
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: provider-web
            port:
              number: 80
      - path: /query
        pathType: Prefix
        backend:
          service:
            name: rag-api
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: rag-api
            port:
              number: 8000
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: rag-api
            port:
              number: 8000