global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
- job_name: blackbox_rag_api_health
  metrics_path: /probe
  params:
    module: [http_2xx]
  static_configs:
  - targets:
    - http://rag-api:8000/health
    - http://rag-api:8000/mcp/health
    - http://provider-web/
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115